name: CI

on:
  push:
    branches: [lance-main, lanceforge-clean]
  pull_request:
    branches: [lance-main, lanceforge-clean]

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2  # Limit parallelism to avoid OOM

jobs:
  crate-unit-tests:
    name: Crate Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (zero warnings)
        run: cargo clippy --workspace -- -W clippy::all

      - name: Check (zero warnings)
        run: |
          cargo check -p lance-distributed-proto \
                       -p lance-distributed-common \
                       -p lance-distributed-coordinator \
                       -p lance-distributed-worker \
                       -p lance-distributed-meta 2>&1 | tee /tmp/check.log
          ! grep "^warning:" /tmp/check.log

      - name: Unit tests — proto
        run: cargo test -p lance-distributed-proto --lib

      - name: Unit tests — common
        run: cargo test -p lance-distributed-common --lib

      - name: Unit tests — meta
        run: cargo test -p lance-distributed-meta --lib

      - name: Unit tests — coordinator
        run: cargo test -p lance-distributed-coordinator --lib

      - name: Unit tests — worker
        run: cargo test -p lance-distributed-worker --lib

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: crate-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (serial to avoid port conflicts)
        run: |
          for t in test_distributed_ann test_edge_cases test_data_freshness \
                   test_text_query test_multi_table test_grpc_distributed \
                   test_shard_routing test_benchmark test_durability test_ha; do
            echo "=== $t ==="
            cargo test -p lanceforge --test $t -- --test-threads=1
          done

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          pip install pytest lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: Run tests
        run: |
          cd lance-integration/tools
          python -m pytest test_client.py test_shard_splitter.py -v

  minio-e2e:
    name: MinIO Full-Stack E2E
    runs-on: ubuntu-latest
    needs: [crate-unit-tests, integration-tests]
    if: github.event_name == 'push'  # Only on push, not PR
    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: lanceadmin
          MINIO_ROOT_PASSWORD: lanceadmin123
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release \
            -p lance-distributed-coordinator \
            -p lance-distributed-worker

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: Create MinIO bucket + mc
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://127.0.0.1:9000 lanceadmin lanceadmin123
          /tmp/mc mb local/lance-fulltest

      - name: Run full system E2E
        run: |
          cd lance-integration/tools
          PYTHONPATH=. python e2e_full_system_test.py

  benchmark-regression:
    name: Benchmark Regression (Quick)
    runs-on: ubuntu-latest
    needs: [crate-unit-tests]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release \
            -p lance-distributed-coordinator \
            -p lance-distributed-worker

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: HA verification (8 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_ha_test.py

      - name: Full capability verification (21 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_full_capability_test.py

      - name: TLS verification (6 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_tls_test.py

      - name: Rebalance verification (7 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_rebalance_test.py

      # Phase 11-16 E2E suites (added Phase 17). Each test self-manages its
      # own cluster; pkill before each ensures port reuse cleanly.
      - name: Phase 11 E2E — auto-shard + write no-dup
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase11_test.py

      - name: Phase 12 E2E — fsync + Saga rollback + RBAC
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase12_test.py

      - name: Phase 13 E2E — pagination + response cap + audit + auto-compaction
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase13_test.py

      - name: Phase 14 E2E — MoveShard + slow-query + per-table metrics
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase14_test.py

      - name: Phase 15 E2E — Delete/Upsert shard-level + DropTable purge
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase15_test.py

      - name: Phase 16 E2E — Upsert hash-partition + orphan GC
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase16_test.py

      - name: Phase 17 smoke benchmark (regression guard, ~2 min)
        run: |
          cd lance-integration/bench
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=../tools:../sdk/python python -u bench_phase17_matrix.py --smoke

      - name: Benchmark regression (quick)
        run: |
          cd lance-integration/bench
          PYTHONPATH=../tools:../sdk/python python run_all.py --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: lance-integration/bench/results/regression_report.json
