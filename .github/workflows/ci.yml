name: CI

on:
  push:
    branches: [lance-main, lanceforge-clean]
  pull_request:
    branches: [lance-main, lanceforge-clean]
  # H20: nightly-tier jobs run on schedule. Covers the full Python E2E
  # matrix + extended bench regression; these are too expensive for
  # every PR but catch slow drifts between releases.
  schedule:
    - cron: '17 3 * * *'  # daily at 03:17 UTC — off-peak, avoids the
                          # top-of-hour spike when every CI pipeline
                          # on earth runs
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2  # Limit parallelism to avoid OOM

jobs:
  crate-unit-tests:
    name: Crate Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Hard gate: any clippy warning in our crates fails the build.
      # Legacy ballista/* is intentionally excluded — we don't own its lint
      # debt, and it has its own test suite that covers those crates.
      - name: Clippy (deny warnings on lance-distributed-* + lanceforge)
        run: |
          cargo clippy --lib --tests --bins \
            -p lance-distributed-common \
            -p lance-distributed-proto \
            -p lance-distributed-meta \
            -p lance-distributed-coordinator \
            -p lance-distributed-worker \
            -p lance-distributed-roles \
            -p lanceforge \
            -- -D warnings

      - name: Check (zero warnings)
        run: |
          cargo check --bins \
                       -p lance-distributed-proto \
                       -p lance-distributed-common \
                       -p lance-distributed-coordinator \
                       -p lance-distributed-worker \
                       -p lance-distributed-meta \
                       -p lance-distributed-roles 2>&1 | tee /tmp/check.log
          ! grep "^warning:" /tmp/check.log

      - name: Unit tests — proto
        run: cargo test -p lance-distributed-proto --lib

      - name: Unit tests — common
        run: cargo test -p lance-distributed-common --lib

      - name: Unit tests — meta
        run: cargo test -p lance-distributed-meta --lib

      - name: Unit tests — coordinator
        run: cargo test -p lance-distributed-coordinator --lib

      - name: Unit tests — worker
        run: cargo test -p lance-distributed-worker --lib

      # v2 architecture Phase A/B: roles crate owns the lance-coordinator /
      # lance-worker / lance-monolith binaries. The monolith bin has
      # CLI unit tests in-file (port validation, role parsing, etc.)
      # that only fire under `--bins`.
      - name: Unit tests — roles (bin CLI tests)
        run: cargo test -p lance-distributed-roles --bins

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: crate-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Integration tests (serial to avoid port conflicts)
        run: |
          for t in test_distributed_ann test_edge_cases test_data_freshness \
                   test_text_query test_multi_table test_grpc_distributed \
                   test_shard_routing test_benchmark test_durability test_ha; do
            echo "=== $t ==="
            cargo test -p lanceforge --test $t -- --test-threads=1
          done

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          pip install pytest lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: Run tests
        run: |
          cd lance-integration/tools
          python -m pytest test_client.py test_shard_splitter.py -v

  minio-e2e:
    name: MinIO Full-Stack E2E
    runs-on: ubuntu-latest
    needs: [crate-unit-tests, integration-tests]
    if: github.event_name == 'push'  # Only on push, not PR

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=lanceadmin \
            -e MINIO_ROOT_PASSWORD=lanceadmin123 \
            minio/minio:latest server /data --console-address ":9001"
          # Wait for MinIO to become healthy
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:9000/minio/health/live || { docker logs minio; exit 1; }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release --bin lance-coordinator --bin lance-worker --bin lance-monolith --bin lance-cp --bin lance-idx

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: Create MinIO bucket + mc
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local http://127.0.0.1:9000 lanceadmin lanceadmin123
          /tmp/mc mb local/lance-fulltest

      - name: Run full system E2E
        run: |
          cd lance-integration/tools
          PYTHONPATH=. python e2e_full_system_test.py

  # H9 PR-blocking tier: two fast Python E2E scripts that exercise
  # cross-process wiring (coord + workers + metadata round-trip +
  # failure recovery). Runs on every PR, unlike the push-only
  # minio-e2e / benchmark-regression jobs above. Budget: ~3 minutes
  # total so PR feedback stays fast.
  python-e2e-fast:
    name: Python E2E (Fast, PR-blocking)
    runs-on: ubuntu-latest
    needs: [crate-unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release --bin lance-coordinator --bin lance-worker --bin lance-monolith --bin lance-cp --bin lance-idx

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: e2e_ha_test.py (coord + worker restart survival)
        timeout-minutes: 5
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_ha_test.py

      - name: e2e_add_upsert_consistency_test.py (Add/Upsert dedup routing)
        timeout-minutes: 3
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_add_upsert_consistency_test.py

      # H22 smoke bench: runs the 10K × {1,2}-shard × {1,10}-conc matrix
      # (bench_phase17_matrix.py --smoke, ~2 min). The numbers get
      # archived as a workflow artifact so reviewers can diff against
      # `benchmarks/baseline.json`. Baseline enforcement (fail-on-regression)
      # is intentionally deferred: picking the right threshold needs a few
      # cycles of real-world variance data, and doing it wrong produces
      # spurious CI failures that erode trust in the gate.
      - name: Smoke benchmark (2 min)
        timeout-minutes: 5
        run: |
          cd lance-integration/bench
          LANCEFORGE_BIN=$(pwd)/../../target/release \
            python bench_phase17_matrix.py --smoke

      - name: Check bench vs baseline (warning-only for now)
        run: |
          cd lance-integration/bench
          if [ -f ../../benchmarks/baseline.json ]; then
            python ../../benchmarks/check_regression.py \
              --baseline ../../benchmarks/baseline.json \
              --current results/phase17/ \
              --threshold-pct 15 \
              --warn-only || echo "::warning::Smoke bench regression above threshold (not blocking yet)"
          else
            echo "::notice::No benchmarks/baseline.json committed yet; skipping regression check"
          fi

      - name: Archive smoke bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-bench-${{ github.sha }}
          path: lance-integration/bench/results/phase17/

  # H9 + H20: nightly-only extended E2E. Runs the longer tests (TLS,
  # rebalance, full capability matrix, enterprise RBAC). Any of these
  # failing doesn't block PRs but does surface as a nightly alert.
  python-e2e-nightly:
    name: Python E2E (Nightly Extended)
    runs-on: ubuntu-latest
    needs: [crate-unit-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release --bin lance-coordinator --bin lance-worker --bin lance-monolith --bin lance-cp --bin lance-idx

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      # Each test is independently gated so a single hang doesn't eat
      # the whole 6-hour GitHub timeout.
      - name: e2e_full_capability_test.py
        timeout-minutes: 10
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_full_capability_test.py

      - name: e2e_rebalance_test.py
        timeout-minutes: 10
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_rebalance_test.py

      - name: e2e_tls_test.py
        timeout-minutes: 5
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_tls_test.py

      - name: e2e_enterprise_test.py
        timeout-minutes: 5
        run: cd lance-integration/tools && LANCEFORGE_BIN=$(pwd)/../../target/release python e2e_enterprise_test.py

  benchmark-regression:
    name: Benchmark Regression (Quick)
    runs-on: ubuntu-latest
    needs: [crate-unit-tests]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: |
          cargo build --release --bin lance-coordinator --bin lance-worker --bin lance-monolith --bin lance-cp --bin lance-idx

      - name: Install Python deps
        run: pip install lance pylance numpy pyyaml grpcio grpcio-tools pyarrow

      - name: Generate proto stubs
        run: |
          cd lance-integration/tools
          python -m grpc_tools.protoc -I../../crates/proto/proto \
            --python_out=. --grpc_python_out=. ../../crates/proto/proto/lance_service.proto

      - name: HA verification (8 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_ha_test.py

      - name: Full capability verification (21 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_full_capability_test.py

      - name: TLS verification (6 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_tls_test.py

      - name: Rebalance verification (7 tests)
        run: |
          cd lance-integration/tools
          PYTHONPATH=.:../sdk/python python e2e_rebalance_test.py

      # Phase 11-16 E2E suites (added Phase 17). Each test self-manages its
      # own cluster; pkill before each ensures port reuse cleanly.
      - name: Phase 11 E2E — auto-shard + write no-dup
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase11_test.py

      - name: Phase 12 E2E — fsync + Saga rollback + RBAC
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase12_test.py

      - name: Phase 13 E2E — pagination + response cap + audit + auto-compaction
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase13_test.py

      - name: Phase 14 E2E — MoveShard + slow-query + per-table metrics
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase14_test.py

      - name: Phase 15 E2E — Delete/Upsert shard-level + DropTable purge
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase15_test.py

      - name: Phase 16 E2E — Upsert hash-partition + orphan GC
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_phase16_test.py

      - name: Add/Upsert routing consistency (LIMITATIONS.md §1 fix)
        run: |
          cd lance-integration/tools
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=.:../sdk/python python e2e_add_upsert_consistency_test.py

      - name: Phase 17 smoke benchmark (regression guard, ~2 min)
        run: |
          cd lance-integration/bench
          pkill -9 -f 'lance-' 2>/dev/null || true; sleep 3
          PYTHONPATH=../tools:../sdk/python python -u bench_phase17_matrix.py --smoke

      - name: Benchmark regression (quick)
        run: |
          cd lance-integration/bench
          PYTHONPATH=../tools:../sdk/python python run_all.py --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: lance-integration/bench/results/regression_report.json

  security-audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Fail on any known CVE in Cargo.lock.
      # The --ignore list is mirrored in `audit.toml` at the repo root, which
      # carries the dated justification for each entry. Keep them in sync when
      # adding/removing an ignore.
      - name: Run cargo-audit
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0002

  coverage:
    name: Code Coverage (lib + integration)
    runs-on: ubuntu-latest
    needs: crate-unit-tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cov-

      # The meaningful coverage signal comes from merging three corpora:
      # (1) per-crate lib tests, (2) the in-process integration test suite
      # that exercises full coordinator↔worker gRPC paths, and (3) the
      # meta/common/worker unit tests. llvm-cov's --no-report lets us
      # accumulate profraw across multiple runs and emit a single report.
      #
      # Scope: our 5 distributed crates + lanceforge integration crate.
      # Generated protobuf stubs (crates/proto/src/generated/**) and
      # main.rs binary shims are excluded via --ignore-filename-regex —
      # they skew the denominator without being meaningfully testable.
      - name: Lib coverage (distributed crates)
        run: |
          cargo llvm-cov --no-report --lib \
            -p lance-distributed-common \
            -p lance-distributed-proto \
            -p lance-distributed-meta \
            -p lance-distributed-coordinator \
            -p lance-distributed-worker

      # Integration tests run serially with --test-threads=1 to avoid port
      # conflicts — the binaries bind real TCP ports for the in-process
      # coordinator/worker. Pattern matches the integration-tests job.
      - name: Integration coverage (lanceforge)
        run: |
          for t in test_distributed_ann test_edge_cases test_data_freshness \
                   test_text_query test_multi_table test_grpc_distributed \
                   test_shard_routing test_durability test_ha; do
            echo "=== $t ==="
            cargo llvm-cov --no-report --test $t -p lanceforge -- --test-threads=1
          done

      - name: Emit lcov.info (for artifact)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex 'generated|bin/main\.rs'

      # Gate: line coverage must stay ≥ 70%.
      # Baseline at the time this gate was raised was 70.11% lines / 70.48%
      # regions (measured with lib + integration tests). 70 is where the
      # floor lands — zero margin is intentional: we've already added unit
      # tests to cover the gap, so any drop below 70 means a real
      # regression (untested new code, deleted tests). Raise this
      # threshold deliberately when coverage ratchets up.
      - name: Summary + threshold gate
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'generated|bin/main\.rs' \
            --fail-under-lines 70 \
            | tee coverage-summary.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt
