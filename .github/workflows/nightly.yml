name: Nightly Deep Tests

# Runs extended property tests and a fresh security audit every night.
# Keeps the main CI fast while still giving us the corpus coverage that
# short PR-time runs can't afford.

on:
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC daily
  workflow_dispatch: {}    # manual trigger from the Actions UI

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2

jobs:
  proptest-deep:
    name: Proptest Deep Run (10000 cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-nightly-

      # PROPTEST_CASES is read by ProptestConfig::default(). Our tests don't
      # override `cases:`, so this env takes effect directly. 10k cases vs
      # the ~256 default gives meaningfully deeper corpus coverage for
      # assign_shards invariants and global_top_k merge correctness.
      - name: Run proptest suites with deep corpus
        env:
          PROPTEST_CASES: "10000"
          # Fail loudly if any generator shrinks to a regression file.
          PROPTEST_FAILURE_PERSISTENCE: "off"
        run: |
          cargo test -p lance-distributed-meta --lib -- prop_ --nocapture
          cargo test -p lance-distributed-coordinator --lib -- prop_ --nocapture

  security-audit-fresh:
    name: Fresh Security Audit (rebuild cache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Uses the live RustSec advisory feed, unlike cached PR runs.
      # Ignore list mirrors ci.yml; justifications live in audit.toml.
      - name: Run cargo-audit
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0002
