# LanceForge: 1 Coordinator + 2 Workers
# Usage: docker compose up (generates sample data automatically)
version: "3.8"

volumes:
  lance-data:

services:
  init:
    build:
      context: ../..
      dockerfile: lance-integration/Dockerfile
    entrypoint: ["/bin/bash", "/app/docker-entrypoint.sh", "init"]
    environment:
      DATA_DIR: /data
    volumes:
      - lance-data:/data
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro

  coordinator:
    build:
      context: ../..
      dockerfile: lance-integration/Dockerfile
    command: lance-coordinator /data/cluster_config.yaml 50050
    ports:
      - "50050:50050"
      - "50051:50051"
    volumes:
      - lance-data:/data:ro
    depends_on:
      init:
        condition: service_completed_successfully
      worker-0:
        condition: service_started
      worker-1:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:50051/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  worker-0:
    build:
      context: ../..
      dockerfile: lance-integration/Dockerfile
    command: lance-worker /data/cluster_config.yaml worker_0 50100
    volumes:
      - lance-data:/data:ro
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  worker-1:
    build:
      context: ../..
      dockerfile: lance-integration/Dockerfile
    command: lance-worker /data/cluster_config.yaml worker_1 50101
    volumes:
      - lance-data:/data:ro
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
