apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lanceforge.fullname" . }}-worker
  labels:
    {{- include "lanceforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  serviceName: {{ include "lanceforge.fullname" . }}-worker-headless
  replicas: {{ .Values.worker.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "lanceforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "lanceforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "lanceforge.serviceAccountName" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["lance-worker"]
          args:
            - /config/cluster_config.yaml
            - "$(WORKER_ID)"
            - "{{ .Values.worker.port }}"
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: grpc
              containerPort: {{ .Values.worker.port }}
              protocol: TCP
          readinessProbe:
            exec:
              command: ["grpc_health_probe", "-addr=:{{ .Values.worker.port }}"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["grpc_health_probe", "-addr=:{{ .Values.worker.port }}"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.security.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "lanceforge.fullname" . }}-config
        {{- if .Values.security.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.security.tls.certSecretName }}
        {{- end }}
