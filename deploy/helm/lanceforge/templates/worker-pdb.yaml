{{- if .Values.pdb.worker.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lanceforge.fullname" . }}-worker
  labels:
    {{- include "lanceforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  maxUnavailable: {{ .Values.pdb.worker.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "lanceforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
{{- end }}
