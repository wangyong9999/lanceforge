// Lance distributed retrieval gRPC service definition.

syntax = "proto3";
package lance.distributed;

// Service running on the Scheduler for clients to submit Lance queries.
service LanceSchedulerService {
  rpc AnnSearch (AnnSearchRequest) returns (SearchResponse) {}
  rpc FtsSearch (FtsSearchRequest) returns (SearchResponse) {}
  rpc HybridSearch (HybridSearchRequest) returns (SearchResponse) {}
  // Cluster status (for monitoring/debugging)
  rpc GetClusterStatus (ClusterStatusRequest) returns (ClusterStatusResponse) {}
  // Write operations
  rpc AddRows (AddRowsRequest) returns (WriteResponse) {}
  rpc DeleteRows (DeleteRowsRequest) returns (WriteResponse) {}
  rpc UpsertRows (UpsertRowsRequest) returns (WriteResponse) {}
  // DDL operations
  rpc CreateTable (CreateTableRequest) returns (CreateTableResponse) {}
  rpc ListTables (ListTablesRequest) returns (ListTablesResponse) {}
  rpc DropTable (DropTableRequest) returns (DropTableResponse) {}
  rpc CreateIndex (CreateIndexRequest) returns (CreateIndexResponse) {}
  rpc GetSchema (GetSchemaRequest) returns (GetSchemaResponse) {}
  rpc CountRows (CountRowsRequest) returns (CountRowsResponse) {}
  rpc Rebalance (RebalanceRequest) returns (RebalanceResponse) {}
  rpc RegisterWorker (RegisterWorkerRequest) returns (RegisterWorkerResponse) {}
  rpc MoveShard (MoveShardRequest) returns (MoveShardResponse) {}
  // Point lookup
  rpc GetByIds (GetByIdsRequest) returns (SearchResponse) {}
  // Expression scan (SQL filter without vector)
  rpc Query (QueryRequest) returns (SearchResponse) {}
  // Batch vector search (multiple queries in one RPC)
  rpc BatchSearch (BatchSearchRequest) returns (BatchSearchResponse) {}
}

message MoveShardRequest {
  string shard_name = 1;
  string to_worker = 2;   // target worker id
  bool force = 3;         // if true, load on new worker even if old is unhealthy
}

message MoveShardResponse {
  string from_worker = 1;
  string to_worker = 2;
  string error = 3;
}

message RebalanceRequest {}
message RebalanceResponse {
  uint32 shards_moved = 1;
  string error = 2;
}

message RegisterWorkerRequest {
  string worker_id = 1;
  string host = 2;
  uint32 port = 3;
}

message RegisterWorkerResponse {
  uint32 assigned_shards = 1;
  string error = 2;
}

// Service running on each Executor for receiving queries from Scheduler.
service LanceExecutorService {
  rpc ExecuteLocalSearch (LocalSearchRequest) returns (LocalSearchResponse) {}
  rpc ExecuteLocalWrite (LocalWriteRequest) returns (LocalWriteResponse) {}
  rpc LoadShard (LoadShardRequest) returns (LoadShardResponse) {}
  rpc UnloadShard (UnloadShardRequest) returns (UnloadShardResponse) {}
  rpc ExecuteCreateIndex (CreateIndexRequest) returns (CreateIndexResponse) {}
  rpc GetTableInfo (GetTableInfoRequest) returns (GetTableInfoResponse) {}
  rpc CompactAll (CompactRequest) returns (CompactResponse) {}
  rpc CreateLocalShard (CreateLocalShardRequest) returns (CreateLocalShardResponse) {}
  rpc LocalGetByIds (GetByIdsRequest) returns (LocalSearchResponse) {}
  rpc LocalQuery (QueryRequest) returns (LocalSearchResponse) {}
  // Health check (Scheduler periodically pings Executors)
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse) {}
}

message CreateLocalShardRequest {
  string shard_name = 1;
  string parent_uri = 2;
  bytes arrow_ipc_data = 3;
  string index_column = 4;
  uint32 index_num_partitions = 5;
  map<string, string> storage_options = 6;
}

message CreateLocalShardResponse {
  uint64 num_rows = 1;
  string uri = 2;
  string error = 3;
}

message CompactRequest {}
message CompactResponse {
  uint64 tables_compacted = 1;
  string error = 2;
}

// ============ Health / Status ============

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  uint32 loaded_shards = 2;
  uint64 total_rows = 3;
}

message ClusterStatusRequest {}

message ClusterStatusResponse {
  repeated ExecutorStatus executors = 1;
  uint32 total_shards = 2;
  uint64 total_rows = 3;
}

message ExecutorStatus {
  string executor_id = 1;
  string host = 2;
  uint32 port = 3;
  bool healthy = 4;
  uint32 loaded_shards = 5;
  int64 last_health_check_ms = 6;  // unix timestamp ms
}

// ============ Client → Scheduler ============

message AnnSearchRequest {
  string table_name = 1;
  string vector_column = 2;
  bytes query_vector = 3;      // f32 little-endian bytes (required if query_text empty)
  uint32 dimension = 4;
  uint32 k = 5;
  uint32 nprobes = 6;
  optional string filter = 7;
  repeated string columns = 8;
  int32 metric_type = 9;       // 0=L2, 1=Cosine, 2=Dot
  optional string query_text = 10;  // If set, auto-embed to vector (requires embedding model config)
  uint32 offset = 11;          // Pagination: skip the first N globally-merged hits (0 = first page)
}

message FtsSearchRequest {
  string table_name = 1;
  string text_column = 2;
  string query_text = 3;
  uint32 k = 4;
  optional string filter = 5;
  repeated string columns = 6;
  uint32 offset = 7;
}

message HybridSearchRequest {
  string table_name = 1;
  // Vector part
  string vector_column = 2;
  bytes query_vector = 3;
  uint32 dimension = 4;
  uint32 nprobes = 5;
  // Text part
  string text_column = 6;
  string query_text = 7;
  // Common
  uint32 k = 8;
  optional string filter = 9;
  repeated string columns = 10;
  int32 metric_type = 11;
  uint32 offset = 12;
}

message GetByIdsRequest {
  string table_name = 1;
  repeated int64 ids = 2;            // primary key values to look up
  string id_column = 3;              // column name for the primary key (default: "id")
  repeated string columns = 4;       // columns to return (empty = all)
}

message QueryRequest {
  string table_name = 1;
  string filter = 2;                 // SQL WHERE predicate (required)
  uint32 limit = 3;                  // max rows to return (default 100)
  uint32 offset = 4;                 // skip first N rows
  repeated string columns = 5;       // columns to return (empty = all)
}

message BatchSearchRequest {
  string table_name = 1;
  repeated bytes query_vectors = 2;  // N query vectors (each: f32 little-endian bytes)
  string vector_column = 3;
  uint32 dimension = 4;
  uint32 k = 5;
  uint32 nprobes = 6;
  optional string filter = 7;
  repeated string columns = 8;
  int32 metric_type = 9;
}

message BatchSearchResponse {
  repeated SearchResponse results = 1;
  string error = 2;
}

message SearchResponse {
  bytes arrow_ipc_data = 1;    // Arrow IPC StreamWriter bytes
  uint32 num_rows = 2;
  string error = 3;            // empty if success
  bool truncated = 4;          // true if response was capped by max_response_bytes
  uint32 next_offset = 5;      // Suggested offset for the next page (0 if no more)
  uint64 latency_ms = 6;       // Server-side latency in milliseconds (scatter-gather wall time)
}

// ============ Scheduler → Executor ============

message LocalSearchRequest {
  int32 query_type = 1;        // 0=ANN, 1=FTS, 2=Hybrid
  string table_name = 2;
  // Vector params
  optional string vector_column = 3;
  optional bytes query_vector = 4;
  optional uint32 dimension = 5;
  optional uint32 nprobes = 6;
  optional int32 metric_type = 7;
  // FTS params
  optional string text_column = 8;
  optional string query_text = 9;
  // Common
  uint32 k = 10;
  optional string filter = 11;
  repeated string columns = 12;
}

message LocalSearchResponse {
  bytes arrow_ipc_data = 1;
  uint32 num_rows = 2;
  string error = 3;
}

// ============ Client → Scheduler (Writes) ============

message AddRowsRequest {
  string table_name = 1;
  bytes arrow_ipc_data = 2;       // Arrow IPC StreamWriter bytes (the rows to add)
}

message DeleteRowsRequest {
  string table_name = 1;
  string filter = 2;              // SQL WHERE predicate (e.g., "id > 100")
}

message UpsertRowsRequest {
  string table_name = 1;
  bytes arrow_ipc_data = 2;       // Rows to upsert (Arrow IPC)
  repeated string on_columns = 3; // Join key columns for dedup (e.g., ["id"])
}

message WriteResponse {
  uint64 affected_rows = 1;
  uint64 new_version = 2;
  string error = 3;               // empty if success
}

// ============ Scheduler → Executor (Writes) ============

message LocalWriteRequest {
  int32 write_type = 1;           // 0=Add, 1=Delete, 2=Upsert
  string table_name = 2;
  bytes arrow_ipc_data = 3;       // For Add/Upsert: rows as Arrow IPC
  string filter = 4;              // For Delete: SQL WHERE predicate
  repeated string on_columns = 5; // For Upsert: join key columns
  string target_shard = 6;        // For Add: specific shard to write to (prevents duplication)
}

message LocalWriteResponse {
  uint64 affected_rows = 1;
  uint64 new_version = 2;
  string error = 3;
}

// ============ Executor Shard Management ============

message LoadShardRequest {
  string shard_name = 1;
  string uri = 2;                 // Lance table URI
  map<string, string> storage_options = 3;
}

message LoadShardResponse {
  uint64 num_rows = 1;
  string error = 2;
}

message UnloadShardRequest {
  string shard_name = 1;
}

message UnloadShardResponse {
  string error = 1;
}

message GetTableInfoRequest {
  string table_name = 1;
}

message GetTableInfoResponse {
  uint64 num_rows = 1;
  repeated ColumnInfo columns = 2;
  string error = 3;
}

// ============ DDL Operations ============

message CreateTableRequest {
  string table_name = 1;
  bytes arrow_ipc_data = 2;       // Initial data as Arrow IPC (defines schema)
  string uri = 3;                 // Storage URI (e.g., "s3://bucket/table.lance")
  string index_column = 4;        // Column to index (optional, auto-creates IVF_FLAT)
  uint32 index_num_partitions = 5; // IVF partitions (default 32)
}

message CreateTableResponse {
  string table_name = 1;
  uint64 num_rows = 2;
  string error = 3;
}

message ListTablesRequest {}

message ListTablesResponse {
  repeated string table_names = 1;
  string error = 2;
}

message DropTableRequest {
  string table_name = 1;
}

message DropTableResponse {
  string error = 1;
}

message CreateIndexRequest {
  string table_name = 1;
  string column = 2;             // Column to index
  string index_type = 3;         // "IVF_FLAT", "IVF_HNSW_SQ", "BTREE", "INVERTED"
  uint32 num_partitions = 4;     // For IVF indexes (default 32)
}

message CreateIndexResponse {
  string error = 1;
}

message GetSchemaRequest {
  string table_name = 1;
}

message GetSchemaResponse {
  repeated ColumnInfo columns = 1;
  string error = 2;
}

message ColumnInfo {
  string name = 1;
  string data_type = 2;
}

message CountRowsRequest {
  string table_name = 1;
  optional string filter = 2;    // Optional SQL WHERE filter
}

message CountRowsResponse {
  uint64 count = 1;
  string error = 2;
}
